# GoReleaser config
project_name: navidrome
version: 2

builds:
  - id: navidrome
    # Instead of compiling the binary with goreleaser, we just copy it from `binaries` folder
    # This is because we need to compile the binaries with our Dockerfile, and to avoid having to
    # compile it twice, we just copy the docker build output. The xxgo script handles this for us
    tool: "./release/xxgo"

    # All available targets compiled by the Dockerfile
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_386
      - linux_amd64
      - linux_arm_5
      - linux_arm_6
      - linux_arm_7
      - linux_arm64
      - linux_riscv64
      - windows_386
      - windows_amd64

archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT"

nfpms:
  - id: navidrome
    package_name: navidrome
    file_name_template: '{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'

    homepage: https://navidrome.org
    description: |-
      🎧☁ Your Personal Streaming Service

    maintainer: Deluan Quintão <deluan at navidrome.org>

    license: GPL-3.0
    formats:
      - deb
      - rpm

    dependencies:
      - ffmpeg

    suggests:
      - mpv

    overrides:
      rpm:
        dependencies:
          - "(ffmpeg or ffmpeg-free)"

    contents:
      - src: release/linux/navidrome.toml
        dst: /etc/navidrome/navidrome.toml
        type: "config|noreplace"
        file_info:
          mode: 0644
          owner: navidrome
          group: navidrome

      - dst: /var/lib/navidrome
        type: dir
        file_info:
          owner: navidrome
          group: navidrome

      - dst: /opt/navidrome/music
        type: dir
        file_info:
          owner: navidrome
          group: navidrome

      - src: release/linux/.package.rpm  # contents: "rpm"
        dst: /var/lib/navidrome/.package
        type: "config|noreplace"
        packager: rpm
      - src: release/linux/.package.deb  # contents: "deb"
        dst: /var/lib/navidrome/.package
        type: "config|noreplace"
        packager: deb

    scripts:
      preinstall: "release/linux/preinstall.sh"
      postinstall: "release/linux/postinstall.sh"
      preremove: "release/linux/preremove.sh"

release:
  draft: false
  mode: append
  footer: |
    **Full Changelog**: https://github.com/RFLundgren/navidrome_experimental/compare/{{ .PreviousTag }}...{{ .Tag }}

    This is a personal fork of [Navidrome](https://github.com/navidrome/navidrome) adding podcast support and
    physical folder browsing - see the [README](https://github.com/RFLundgren/navidrome_experimental#readme) for
    details. For anything about Navidrome itself (not specific to this fork), see the
    [upstream project](https://github.com/navidrome/navidrome).

  # Add the MSI installers to the release
  extra_files:
    - glob: binaries/navidrome_386.msi
      name_template: navidrome_{{.Version}}_windows_386_installer.msi
    - glob: binaries/navidrome_amd64.msi
      name_template: navidrome_{{.Version}}_windows_amd64_installer.msi

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^refactor:"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    - title: "Security updates"
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 150
    - title: "Bug fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 200
    - title: "Documentation updates"
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 400
    - title: "Build process updates"
      regexp: ^.*?(build|ci)(\(.+\))??!?:.+$
      order: 400
    - title: Other work
      order: 9999
